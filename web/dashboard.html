<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Balancer — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0c0c0e;
            --surface: #141417;
            --surface-2: #1a1a1f;
            --border: #232329;
            --border-hover: #2e2e36;
            --text: #e4e4e7;
            --text-muted: #71717a;
            --text-dim: #52525b;
            --accent: #6366f1;
            --accent-soft: rgba(99, 102, 241, 0.12);
            --green: #22c55e;
            --green-soft: rgba(34, 197, 94, 0.1);
            --red: #ef4444;
            --red-soft: rgba(239, 68, 68, 0.1);
            --amber: #f59e0b;
            --amber-soft: rgba(245, 158, 11, 0.1);
            --radius: 10px;
            --radius-sm: 6px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Layout */
        .shell {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text);
        }

        .header p {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ws-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--red);
            transition: background 0.3s;
        }

        .ws-dot.live {
            background: var(--green);
        }

        .ws-label {
            font-size: 12px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .clock {
            font-size: 12px;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
        }

        /* Metric strip */
        .metrics-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 32px;
        }

        .metric-cell {
            background: var(--surface);
            padding: 20px 24px;
        }

        .metric-cell:first-child {
            border-radius: var(--radius) 0 0 var(--radius);
        }

        .metric-cell:last-child {
            border-radius: 0 var(--radius) var(--radius) 0;
        }

        .metric-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text);
        }

        .metric-value.green {
            color: var(--green);
        }

        .metric-value.accent {
            color: var(--accent);
        }

        /* Server table */
        .table-section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .server-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .server-table th {
            text-align: left;
            padding: 12px 20px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
        }

        .server-table td {
            padding: 14px 20px;
            font-size: 13px;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .server-table tr:last-child td {
            border-bottom: none;
        }

        .server-table tbody tr:hover td {
            background: var(--surface-2);
        }

        .server-name {
            font-weight: 600;
            font-size: 14px;
        }

        .server-url {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* Status indicators */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .status.up {
            background: var(--green-soft);
            color: var(--green);
        }

        .status.down {
            background: var(--red-soft);
            color: var(--red);
            animation: blink 1.5s ease-in-out infinite;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .circuit {
            font-size: 11px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
        }

        .circuit.closed {
            background: var(--green-soft);
            color: var(--green);
        }

        .circuit.open {
            background: var(--red-soft);
            color: var(--red);
        }

        .circuit.half {
            background: var(--amber-soft);
            color: var(--amber);
        }

        .latency-bar {
            width: 80px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-left: 8px;
        }

        .latency-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent);
            transition: width 0.4s ease;
        }

        .priority-split {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }

        .pri-high {
            color: var(--amber);
        }

        .pri-low {
            color: var(--text-dim);
        }

        .pri-sep {
            color: var(--text-dim);
            font-size: 10px;
        }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .chart-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-dim);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .metrics-strip {
                grid-template-columns: repeat(2, 1fr);
            }

            .metrics-strip .metric-cell:first-child {
                border-radius: var(--radius) 0 0 0;
            }

            .metrics-strip .metric-cell:nth-child(2) {
                border-radius: 0 var(--radius) 0 0;
            }

            .metrics-strip .metric-cell:nth-child(3) {
                border-radius: 0 0 0 var(--radius);
            }

            .metrics-strip .metric-cell:last-child {
                border-radius: 0 0 var(--radius) 0;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .server-table {
                font-size: 12px;
            }

            .server-table th,
            .server-table td {
                padding: 10px 12px;
            }
        }

        @media (max-width: 600px) {
            .shell {
                padding: 24px 16px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .metrics-strip {
                grid-template-columns: 1fr 1fr;
            }

            .server-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <!-- Header -->
        <header class="header">
            <div>
                <h1>Load Balancer</h1>
                <p>Real-time monitoring</p>
            </div>
            <div class="header-right">
                <span class="ws-label">
                    <span id="ws-dot" class="ws-dot"></span>
                    <span id="ws-text">Offline</span>
                </span>
                <span id="clock" class="clock mono"></span>
            </div>
        </header>

        <!-- Summary metrics -->
        <div class="metrics-strip">
            <div class="metric-cell">
                <div class="metric-label">Requests</div>
                <div id="total-req" class="metric-value mono">0</div>
            </div>
            <div class="metric-cell">
                <div class="metric-label">Success Rate</div>
                <div id="success-rate" class="metric-value green mono">—</div>
            </div>
            <div class="metric-cell">
                <div class="metric-label">Healthy</div>
                <div id="healthy-count" class="metric-value mono">0 / 0</div>
            </div>
            <div class="metric-cell">
                <div class="metric-label">Active Conns</div>
                <div id="active-conn" class="metric-value accent mono">0</div>
            </div>
        </div>

        <!-- Server table -->
        <div class="table-section">
            <div class="section-title">Backends</div>
            <table class="server-table">
                <thead>
                    <tr>
                        <th>Server</th>
                        <th>Status</th>
                        <th>Requests</th>
                        <th>Latency</th>
                        <th>Active</th>
                        <th>Success</th>
                        <th>Circuit</th>
                        <th>Priority</th>
                    </tr>
                </thead>
                <tbody id="server-tbody"></tbody>
            </table>
        </div>

        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">Traffic share</div>
                <canvas id="distChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-title">Latency over time</div>
                <canvas id="latencyChart" height="110"></canvas>
            </div>
        </div>

        <div class="footer">Adaptive Routing · Fault Tolerance · Circuit Breaker</div>
    </div>

    <script>
        // ── Palette ──────────────────────────────────────────
        const C = {
            indigo: '#6366f1',
            emerald: '#10b981',
            amber: '#f59e0b',
            rose: '#f43f5e',
            sky: '#38bdf8',
            violet: '#8b5cf6',
        };
        const PALETTE = [C.indigo, C.emerald, C.amber, C.rose, C.sky, C.violet];

        // ── Charts ───────────────────────────────────────────
        Chart.defaults.color = '#52525b';
        Chart.defaults.borderColor = '#232329';
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.font.size = 11;

        const distChart = new Chart(document.getElementById('distChart'), {
            type: 'doughnut',
            data: { labels: [], datasets: [{ data: [], backgroundColor: PALETTE, borderWidth: 0 }] },
            options: {
                cutout: '70%',
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { padding: 16, usePointStyle: true, pointStyleWidth: 8, font: { size: 11 } }
                    }
                }
            }
        });

        const latencyHistory = {};
        const MAX_POINTS = 40;
        const timeLabels = [];

        const latencyChart = new Chart(document.getElementById('latencyChart'), {
            type: 'line',
            data: { labels: timeLabels, datasets: [] },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: {
                        ticks: { maxTicksLimit: 6, font: { size: 10 } },
                        grid: { display: false }
                    },
                    y: {
                        beginAtZero: true,
                        ticks: { font: { size: 10 }, callback: v => v + 'ms' },
                        grid: { color: '#1a1a1f' }
                    }
                },
                plugins: {
                    legend: {
                        labels: { usePointStyle: true, pointStyleWidth: 8, font: { size: 11 }, padding: 12 }
                    },
                    tooltip: {
                        backgroundColor: '#1a1a1f',
                        borderColor: '#232329',
                        borderWidth: 1,
                        titleFont: { size: 11 },
                        bodyFont: { family: "'JetBrains Mono', monospace", size: 11 },
                        padding: 10,
                        cornerRadius: 6,
                        callbacks: { label: ctx => `${ctx.dataset.label}  ${ctx.parsed.y.toFixed(1)}ms` }
                    }
                },
                elements: {
                    line: { tension: 0.35, borderWidth: 2 },
                    point: { radius: 0, hoverRadius: 4 }
                },
                animation: { duration: 250 }
            }
        });

        // ── WebSocket ────────────────────────────────────────
        let ws;
        function connect() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/ws`);

            ws.onopen = () => {
                document.getElementById('ws-dot').classList.add('live');
                document.getElementById('ws-text').textContent = 'Live';
            };
            ws.onclose = () => {
                document.getElementById('ws-dot').classList.remove('live');
                document.getElementById('ws-text').textContent = 'Offline';
                setTimeout(connect, 2000);
            };
            ws.onmessage = e => update(JSON.parse(e.data));
        }

        // ── Update ───────────────────────────────────────────
        function update(servers) {
            const entries = Object.entries(servers);
            let totalReq = 0, totalOK = 0, healthy = 0, active = 0;
            const names = [], reqs = [];

            entries.forEach(([, s]) => {
                totalReq += s.total_requests;
                totalOK += s.success_count;
                active += s.active_connections;
                if (s.is_healthy) healthy++;
                names.push(s.name);
                reqs.push(s.total_requests);
            });

            // Summary
            document.getElementById('total-req').textContent = totalReq.toLocaleString();
            const rate = totalReq > 0 ? (totalOK / totalReq * 100).toFixed(1) + '%' : '—';
            document.getElementById('success-rate').textContent = rate;
            document.getElementById('healthy-count').textContent = `${healthy} / ${entries.length}`;
            document.getElementById('active-conn').textContent = active;

            // Table
            const tbody = document.getElementById('server-tbody');
            tbody.innerHTML = entries.map(([url, s], i) => {
                const pct = totalReq > 0 ? (s.total_requests / totalReq * 100).toFixed(1) : '0.0';
                const sr = s.total_requests > 0 ? (s.success_count / s.total_requests * 100).toFixed(1) : '—';
                const isUp = s.is_healthy;
                const latPct = Math.min(s.avg_latency_ms / 200 * 100, 100);
                const circClass = s.circuit_state === 'CLOSED' ? 'closed' : s.circuit_state === 'OPEN' ? 'open' : 'half';

                return `<tr>
                    <td>
                        <div class="server-name" style="color:${PALETTE[i % PALETTE.length]}">${s.name}</div>
                        <div class="server-url mono">${url.replace('http://', '')}</div>
                    </td>
                    <td><span class="status ${isUp ? 'up' : 'down'}"><span class="status-dot"></span>${isUp ? 'Healthy' : 'Down'}</span></td>
                    <td class="mono">${s.total_requests.toLocaleString()} <span style="color:var(--text-dim);font-size:11px">(${pct}%)</span></td>
                    <td class="mono">
                        ${s.avg_latency_ms.toFixed(1)}<span style="color:var(--text-dim)">ms</span>
                        <div class="latency-bar"><div class="latency-fill" style="width:${latPct}%;background:${PALETTE[i % PALETTE.length]}"></div></div>
                    </td>
                    <td class="mono">${s.active_connections}</td>
                    <td class="mono">${sr}%</td>
                    <td><span class="circuit ${circClass}">${s.circuit_state}</span></td>
                    <td>
                        <span class="priority-split">
                            <span class="pri-high mono">${s.high_priority_count}</span>
                            <span class="pri-sep">/</span>
                            <span class="pri-low mono">${s.low_priority_count}</span>
                        </span>
                    </td>
                </tr>`;
            }).join('');

            // Distribution chart
            distChart.data.labels = names;
            distChart.data.datasets[0].data = reqs;
            distChart.update();

            // Latency chart
            const now = new Date();
            const label = now.getMinutes().toString().padStart(2, '0') + ':' + now.getSeconds().toString().padStart(2, '0');
            timeLabels.push(label);
            if (timeLabels.length > MAX_POINTS) timeLabels.shift();

            entries.forEach(([, s], i) => {
                if (!latencyHistory[s.name]) latencyHistory[s.name] = [];
                latencyHistory[s.name].push(s.avg_latency_ms);
                if (latencyHistory[s.name].length > MAX_POINTS) latencyHistory[s.name].shift();
            });

            latencyChart.data.datasets = entries.map(([, s], i) => ({
                label: s.name,
                data: latencyHistory[s.name] || [],
                borderColor: PALETTE[i % PALETTE.length],
                backgroundColor: PALETTE[i % PALETTE.length] + '18',
                fill: true,
            }));
            latencyChart.update();
        }

        // ── Clock ────────────────────────────────────────────
        function tick() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            const s = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
        }
        tick();
        setInterval(tick, 1000);

        connect();
    </script>
</body>

</html>
